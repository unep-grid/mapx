<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>{{title}}</title>
    <meta
      name="viewport"
      content="initial-scale=1,maximum-scale=1,user-scalable=no" />

    <script src="https://cdn.jsdelivr.net/npm/maplibre-gl@{{maplibre_version}}/dist/maplibre-gl.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/maplibre-contour@{{maplibre_contour_version}}/dist/index.min.js"></script>
    <link
      href="https://cdn.jsdelivr.net/npm/maplibre-gl@{{maplibre_version}}/dist/maplibre-gl.css"
      rel="stylesheet" />

    <!-- MapxStyle: MapX style assets, PMTiles protocol, basemap style -->
    <script src="https://cdn.jsdelivr.net/gh/unep-grid/mapx-style@v{{mapx_style_version}}/packages/theme-core/dist/mapx-style.umd.js"></script>

    <style>
      body {
        margin: 0;
        padding: 0;
      }
      #map {
        position: absolute;
        top: 0;
        bottom: 0;
        width: 100%;
      }
    </style>
  </head>
  <body>
    <div id="map"></div>

    <script>
            const { MapxStyle } = window.MapxStyle;
            const theme = {{theme}};
            const s3BaseUrl = "{{s3BaseUrl}}";
            const mxStyle = new MapxStyle({
              maplibregl,
              mlcontour,
              theme,
              baseUrl: s3BaseUrl,
            });
            if (!mxStyle.getTheme()) {
              mxStyle.setTheme(theme);
            }

            const sources = {{sources}};
            const layers = {{layers}};

            const map = new maplibregl.Map({
              container: "map",
              style: mxStyle.getStyle(),
              zoom: 2,
              center: [0, 0],
              pitch: 0,
              bearing: 0,
            });

            map.on("load", () => {
              mxStyle.attachMap(map);
              for (const [id, source] of Object.entries(sources)) {
                map.addSource(id, source);
              }
              for (const layer of layers) {
                map.addLayer(layer);
              }
              map.fitBounds({{bounds}});

            });
    </script>
  </body>
</html>
